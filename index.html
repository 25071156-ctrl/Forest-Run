<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fox Runner 3D</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

  <div id="game-container">
    <!-- UI Overlay -->
    <div id="ui-layer">

      <!-- Start Menu -->
      <div id="start-menu" class="panel">
        <h1>FOX RUNNER</h1>
        <p>Use <strong>Arrow Keys</strong> or <strong>A / D</strong> to switch lanes.<br>Press <strong>Space</strong> or
          <strong>Up Arrow</strong> to jump.</p>
        <button id="start-btn">PLAY NOW</button>
      </div>

      <!-- Game HUD -->
      <div id="hud" class="hidden">
        <div class="score-box">
          Score: <span id="score-val">0</span>
        </div>
      </div>

      <!-- Level Up Message -->
      <div id="level-up-msg" class="hidden">
        <h1>LEVEL 2</h1>
      </div>

      <!-- Game Over Menu -->
      <div id="game-over-menu" class="panel hidden">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">TRY AGAIN</button>
      </div>

    </div>
  </div>

  <!-- Game Scripts -->
  <script src="src/Environment.js"></script>
  <script src="src/Player.js"></script>
  <script src="src/ObstacleManager.js"></script>
  <script src="src/main.js"></script>

</body>

</html>
